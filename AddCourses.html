<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUCS - Add Course</title>
    <link rel="stylesheet" href="CSS/Style.css">
</head>
<body>
    <header>
        <nav class="nav">
            <div class="logo"><h1>EUCS</h1></div>
            <ul class="links">
                <li><a href="index.html">Home</a></li>
                <li><a href="MyCourses.html">My Courses</a></li>
                <li><a href="AddCourses.html">Add Course</a></li>
                <li><a href="ContactUs.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="home">
            <div class="main-content">
                <h2>Register New Course</h2>
                <form action="MyCourses.html" method="GET">
                    <label>Full Name:</label>
                    <input type="text" name="fullname" required>
                    <label>Course Name:</label>
                    <input type="text" name="cname" required>
                    <label>Department:</label>
                    <select name="department">
                        <option>Computer Science</option>
                        <option>Information Systems</option>
                        <option>Software Engineering</option>
                    </select>
                    <label>Notes:</label>
                    <textarea rows="4"></textarea>
                    <input type="submit" value="Add Course">
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Egyptian University of Computer Science</p>
    </footer>
</body>
</html>
